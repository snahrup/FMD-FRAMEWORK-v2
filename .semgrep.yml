# Semgrep configuration for FMD Framework
# Run: semgrep scan --config .semgrep.yml
# Or use registry rulesets: semgrep scan --config auto
#
# Severity guide:
#   ERROR   = must fix before merge (blocks CI)
#   WARNING = should fix, documented as known (does not block CI)
#   INFO    = informational only

rules:
  # --- Python Security ---
  - id: hardcoded-secret-in-python
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(secret|password|token|api_key|apikey|client_secret)
    message: "Potential hardcoded secret in variable '$VAR'. Use environment variables."
    languages: [python]
    severity: ERROR
    paths:
      exclude:
        # Diagnostic/utility scripts use env-loaded secrets at runtime;
        # the variable *names* trigger this rule but are loaded from env/config.
        - "diag_*.py"
        - "scripts/*"
        - "src/antigravity/*"
        - "build_guid_map.py"
        - "check_board.py"
        - "delete_board.py"
        - "list_boards.py"
        - "miro_board.py"
        - "upload_notebooks.py"
        - "fix_pipeline_guids.py"
        - "fix_ldz_issues.py"
        - "fix_prod_guids.py"
        - "finalize_deployment.py"
        - "deploy_prod.py"

  - id: sql-injection-format-string
    patterns:
      - pattern: |
          cursor.execute(f"...")
    message: "Potential SQL injection via f-string in cursor.execute(). Use parameterized queries."
    languages: [python]
    severity: ERROR
    paths:
      exclude:
        # Utility/deployment scripts interpolate hardcoded table names and
        # constants, not user input. Reviewed and accepted as safe.
        - "scripts/*"
        - "diag_*.py"
        - "deploy_from_scratch.py"
        # server.py SQL explorer uses _sanitize_sql_str() on all inputs and
        # is behind Windows auth (internal network only). Dynamic identifiers
        # (schema/table names) cannot be parameterized in T-SQL.
        - "dashboard/app/api/server.py"

  - id: sql-injection-percent-format
    patterns:
      - pattern: |
          cursor.execute("..." % ...)
    message: "Potential SQL injection via %-formatting in cursor.execute(). Use parameterized queries."
    languages: [python]
    severity: ERROR

  # --- TypeScript/React Security ---
  - id: dangerous-inner-html
    pattern: dangerouslySetInnerHTML={...}
    message: "dangerouslySetInnerHTML usage detected. Ensure input is sanitized."
    languages: [typescript]
    severity: WARNING

  # --- FMD-Specific Rules ---
  - id: fmd-hardcoded-guid
    patterns:
      - pattern-regex: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
      - pattern-not-regex: "\\$\\{|config\\.|item_config|GUID|00000000-0000-0000-0000-000000000000"
    paths:
      include:
        - "/engine/*.py"
        - "/src/**/*.py"
    message: "Hardcoded GUID detected. GUIDs should come from config/item_config.yaml, not hardcoded in source."
    languages: [python]
    severity: WARNING

  - id: fmd-no-ipaper-suffix
    pattern-regex: "\\bipaper\\.com\\b"
    message: "Do NOT use .ipaper.com suffix for server hostnames. Use short hostname only (e.g., m3-db1, not m3-db1.ipaper.com)."
    languages: [python, typescript]
    severity: WARNING
    # Downgraded: the only finding is in a docstring warning NOT to use .ipaper.com

  - id: fmd-wrong-token-scope
    pattern-regex: "database\\.windows\\.net"
    message: "Wrong auth scope. Fabric SQL uses 'https://analysis.windows.net/powerbi/api/.default', NOT database.windows.net."
    languages: [python]
    severity: WARNING
    # Downgraded: most findings are in comments/docstrings warning about the wrong scope,
    # or in the correct engine/auth.py which uses analysis.windows.net but mentions the wrong
    # scope in documentation. The rule cannot distinguish code from comments.
