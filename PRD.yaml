      ## extractor.py
      Extract data from source SQL servers using pyodbc + polars (for performance).
      ```python
      import polars as pl

      def extract_entity(entity: Entity, source_conn) -> pl.DataFrame:
          """Extract data from source SQL Server.
          - Full load: SELECT * FROM [Schema].[Table]
          - Incremental: SELECT * FROM [Schema].[Table] WHERE [WatermarkCol] > @LastValue
          Returns a polars DataFrame."""

          if entity.is_incremental and entity.last_load_value:
              query = f"SELECT * FROM [{entity.source_schema}].[{entity.source_name}] WHERE [{entity.watermark_column}] > ?"
              params = [entity.last_load_value]
          else:
              query = f"SELECT * FROM [{entity.source_schema}].[{entity.source_name}]"
              params = []

          df = pl.read_database(query, source_conn, execute_options={"parameters": params})
          return df
      ```

      IMPORTANT gotchas from our experience:
      - Exclude rowversion/timestamp columns from watermark comparison (binary types can't compare as varchar)
      - Strip whitespace from SourceName (was root cause of 55% of LZ failures)
      - Handle large tables (>1M rows) with chunked reads to avoid OOM

      ## loader.py
      Write Parquet files to OneLake Landing Zone via ADLS/Azure SDK.
      OneLake path pattern: `https://onelake.dfs.fabric.microsoft.com/{workspace_id}/{lakehouse_id}/Files/{path}/{filename}`

      Use `azure-storage-file-datalake` or direct REST API to write files.
      The file path should match what the Bronze notebook expects:
      - Path: `{DataSourceNamespace}/{SourceSchema}_{SourceName}/`
      - Filename: `{SourceSchema}_{SourceName}_{timestamp}.parquet`

      After successful write:
      1. Call `execution.sp_UpsertPipelineLandingzoneEntity` to mark as loaded
      2. Call `execution.sp_UpdateLastLoadValue` to advance watermark
      3. Call `execution.sp_UpsertEntityStatus` to update digest
      4. Call `logging.sp_AuditCopyActivity` with structured JSON log envelope

      ## orchestrator.py
      The main run loop. THIS MUST BE SIMPLE:
      ```python
      class LoadOrchestrator:
          def run(self, mode: str = "run", entity_ids: list = None, layers: list = None):
              """Main entry point. Called by REST API from dashboard.
              mode: 'plan' = compute worklist only, 'run' = execute
              entity_ids: optional filter (None = all active)
              layers: optional filter ['landing', 'bronze', 'silver'] (None = all)
              """
              run_id = str(uuid.uuid4())
              self.log_run_start(run_id, mode, entity_ids, layers)

              # 1. Get active entities from SQL control table
              entities = self.get_worklist(entity_ids)
              self.log(f"Worklist: {len(entities)} entities")

              if mode == "plan":
                  return self.build_plan(run_id, entities, layers)

              results = []

              # 2. Landing Zone — extract from source, write Parquet
              if not layers or 'landing' in layers:
                  lz_results = self.run_landing_zone(run_id, entities)
                  results.extend(lz_results)

              # 3. Bronze — trigger Fabric notebook via REST API
              if not layers or 'bronze' in layers:
                  bronze_results = self.run_bronze(run_id)
                  results.extend(bronze_results)

              # 4. Silver — trigger Fabric notebook via REST API
              if not layers or 'silver' in layers:
                  silver_results = self.run_silver(run_id)
                  results.extend(silver_results)

              self.log_run_end(run_id, results)
              return results
      ```

      ## models.py
      Data classes:
      ```python
      @dataclass
      class Entity:
          id: int
          source_name: str
          source_schema: str
          source_server: str
          source_database: str
          datasource_id: int
          connection_type: str
          workspace_guid: str
          lakehouse_guid: str
          file_path: str
          file_name: str
          is_incremental: bool
          watermark_column: str | None
          last_load_value: str | None
          primary_keys: str | None
          is_active: bool

      @dataclass
      class RunResult:
          entity_id: int
          layer: str  # landing | bronze | silver
          status: str  # succeeded | failed | skipped
          rows_read: int
          rows_written: int
          bytes_transferred: int
          duration_seconds: float
          error: str | None
          watermark_before: str | None
          watermark_after: str | None

      @dataclass
      class LogEnvelope:
          """Structured JSON log — ALWAYS valid JSON, ALWAYS populated."""
          v: int = 1
          run_id: str
          entity_id: int
          layer: str
          action: str  # Start | End | Fail | Skip
          source: dict  # server, database, table, query
          target: dict  # lakehouse, path, format
          watermark: dict  # column, previous, new, load_type
          metrics: dict  # rows_read, rows_written, bytes, duration, rows_per_sec
          error: dict | None  # type, message, stack_trace, suggestion
          timestamps: dict  # started_utc, completed_utc
      ```

      ## logging_db.py
      Write structured logs to the SAME SQL tables the dashboard already reads:
      - `logging.sp_AuditPipeline` — for run-level logs
      - `logging.sp_AuditCopyActivity` — for entity-level extract/load logs
      - `logging.sp_AuditNotebook` — for Bronze/Silver notebook trigger logs
      - `execution.sp_UpsertEntityStatus` — for digest engine

      The LogData parameter MUST be valid JSON (no trailing commas, no null fields).
      Use the LogEnvelope dataclass -> json.dumps() for guaranteed validity.

      ## Dependencies (pip install)
      ```
      pyodbc                  # SQL Server connections (already installed)
      polars                  # Fast DataFrame operations (Arrow-native)
      azure-storage-file-datalake  # Write to OneLake via ADLS API
      azure-identity          # SP auth for OneLake (DefaultAzureCredential)
