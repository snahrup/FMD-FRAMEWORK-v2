# ============================================================================
# FMD v3 — "The Simple One"
# Pure Python data loading engine + enhanced dashboard
# Replaces 26 Fabric pipelines with a single Python service
# IP Corp never touches a terminal. Everything through the dashboard.
# ============================================================================
#
# Architecture:
#   Dashboard (React + Flask API) → Python Load Engine (Windows Service)
#   Engine reads SQL control table → extracts from source SQL → writes to OneLake
#   Bronze/Silver: Fabric notebooks triggered via REST API (Spark handles Delta merges)
#   All logging to same SQL tables → dashboard displays unchanged
#
# What stays: Fabric SQL DB, Lakehouses, Bronze/Silver notebooks, Dashboard, Entity metadata
# What dies: All 26 pipelines, variable libraries, GUID remapping, pipeline deployment scripts
# ============================================================================

tasks:
  # ══════════════════════════════════════════════════════════════════════════
  # GROUP 1: Foundation — Core engine + config (parallel, independent)
