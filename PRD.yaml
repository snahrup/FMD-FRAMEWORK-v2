      ## Key Design Principles
      - ZERO terminal interaction. Everything operated via REST API from dashboard.
      - The main loop in orchestrator.py MUST be readable by a junior dev in 5 minutes.
      - Every operation logs structured JSON to the SQL logging tables.
      - Uses the SAME SQL tables as the existing framework (logging.*, execution.*, integration.*).

