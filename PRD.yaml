      ## auth.py
      SP token acquisition for Fabric SQL DB. CRITICAL: Use EXACTLY these patterns:
      ```python
      import struct
      import urllib.request
      import json

      def get_fabric_token(tenant_id: str, client_id: str, client_secret: str) -> bytes:
          """Get SP token for Fabric SQL DB access.
          CRITICAL: scope MUST be 'https://analysis.windows.net/powerbi/api/.default'
          NOT 'https://database.windows.net/.default' — that one DOES NOT WORK."""
          url = f"https://login.microsoftonline.com/{tenant_id}/oauth2/v2.0/token"
          data = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_id': client_id,
              'client_secret': client_secret,
              'scope': 'https://analysis.windows.net/powerbi/api/.default'
          }).encode()
          req = urllib.request.Request(url, data=data, method='POST')
          with urllib.request.urlopen(req) as resp:
              token = json.loads(resp.read())['access_token']
          token_bytes = token.encode('utf-8')
          # CRITICAL: struct pack format is '<I{len}s' — NOT '<IH...'
          return struct.pack(f'<I{len(token_bytes)}s', len(token_bytes), token_bytes)

      def get_fabric_sql_connection(config: EngineConfig):
          """Get pyodbc connection to Fabric SQL DB with SP token."""
          import pyodbc
          token_struct = get_fabric_token(config.tenant_id, config.client_id, config.client_secret)
          conn_str = (
              f"DRIVER={{{config.fabric_sql_driver}}};"
              f"SERVER={config.fabric_sql_server};"
              f"DATABASE={config.fabric_sql_database};"
              f"Encrypt=yes;TrustServerCertificate=no;"
          )
          return pyodbc.connect(conn_str, attrs_before={1256: token_struct})
      ```

      For source SQL servers (on-prem, VPN required), use Windows auth:
      ```python
      def get_source_connection(server: str, database: str):
          """Connect to on-prem SQL Server via Windows auth.
          CRITICAL: Do NOT use .ipaper.com suffix. Just short hostname.
          CRITICAL: ODBC Driver 18, not 17."""
          import pyodbc
          conn_str = (
              f"DRIVER={{ODBC Driver 18 for SQL Server}};"
              f"SERVER={server};"
              f"DATABASE={database};"
              f"Trusted_Connection=yes;"
              f"TrustServerCertificate=yes;"
          )
          return pyodbc.connect(conn_str)
      ```

