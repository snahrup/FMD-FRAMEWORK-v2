  - title: "Build engine REST API for dashboard integration"
    parallel_group: 2
    completed: false
    description: |
      Build REST API endpoints in the existing dashboard server (server.py).
      Import engine module and add /api/engine/* routes.

      ## Endpoints
      - GET  /api/engine/status — engine state, uptime, last run summary
      - POST /api/engine/start — trigger load run (mode, layers, entity_ids, triggered_by)
      - POST /api/engine/stop — cancel current run
      - GET  /api/engine/plan — compute worklist without executing
      - GET  /api/engine/logs — query EngineTaskLog (filter: run_id, entity_id, layer, status)
      - GET  /api/engine/logs/stream — SSE for real-time log streaming
      - POST /api/engine/retry — retry failed entities from a run
      - GET  /api/engine/health — preflight check (connections, SQL, OneLake, entities)
      - GET  /api/engine/metrics — throughput, row counts, duration stats
      - POST /api/engine/entity/{id}/reset — reset watermark for entity

      ## Architecture
      Engine runs in background thread. Module-level state variable for current run.
      SSE pattern: reuse existing /api/deploy/stream pattern from server.py.

      ## CRITICAL: All existing endpoints must continue working. No regressions.

      Read `dashboard/app/api/server.py` first to understand the routing pattern.

      SUCCESS CRITERIA:
