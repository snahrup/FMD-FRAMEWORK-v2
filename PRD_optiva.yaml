    description: |
      OBJECTIVE: Trigger the Landing Zone pipeline via Fabric REST API and monitor until
      it completes. This copies data from ALL source SQL servers (including Optiva) to OneLake.

      IMPORTANT: This pipeline can take 1-4 HOURS. Write a Python script with a polling loop.
      IMPORTANT: Check if a pipeline is already running first — steady-falcon may have triggered one.
      If already running, wait for it to complete then trigger a fresh run.

      Write a SINGLE Python script that does everything and run it with a long timeout.

      AUTH PATTERNS:
      - Fabric REST API scope: https://api.fabric.microsoft.com/.default
      - Fabric SQL scope: https://analysis.windows.net/powerbi/api/.default
      ```python
      import urllib.request, urllib.parse, json, struct, pyodbc, time
      TENANT = 'ca81e9fd-06dd-49cf-b5a9-ee7441ff5303'
      CLIENT = 'ac937c5d-4bdd-438f-be8b-84a850021d2d'
      SECRET = 'Te.8Q~YR_kQ~s-iJvlN-bpO8VCwtObo5pl24pbfu'
      CODE_WS = '146fe38c-f6c3-4e9d-a18c-5c01cad5941e'
      SQL_SERVER = '7xuydsw5a3hutnnj5z2ed72tam-nt3ef5gg5llunagjzcyclsdpxy.database.fabric.microsoft.com,1433'
      SQL_DB = 'SQL_INTEGRATION_FRAMEWORK-501d6b17-fcee-47f3-bbb3-54e05f2a3fc0'
      ```

      STEP 1: Get pipeline GUID from metadata DB:
      ```sql
      SELECT PipelineId, Name, PipelineGuid FROM integration.Pipeline
      WHERE Name LIKE '%LDZ%' OR Name LIKE '%Landing%' ORDER BY PipelineId
      ```
      Expected LZ pipeline GUID: 3d0b3b2b-a069-40dc-b735-d105f9e66838

      STEP 2: Check if pipeline is already running:
      ```python
      token = get_token('https://api.fabric.microsoft.com/.default')
      url = f'https://api.fabric.microsoft.com/v1/workspaces/{CODE_WS}/items/{pipeline_guid}/jobs/instances?jobType=Pipeline'
      req = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
      resp = json.loads(urllib.request.urlopen(req).read())
      active_runs = [r for r in resp.get('value', []) if r.get('status','').lower() in ('notstarted','inprogress')]
      if active_runs:
          print(f'Pipeline already running: {active_runs[0]["id"]}. Waiting...')
          # Poll until it completes
      ```

      STEP 3: Trigger the pipeline:
      ```python
      url = f'https://api.fabric.microsoft.com/v1/workspaces/{CODE_WS}/items/{pipeline_guid}/jobs/instances?jobType=Pipeline'
      req = urllib.request.Request(url, method='POST',
          headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'},
          data=b'{}')
      resp = urllib.request.urlopen(req)
      location = resp.headers.get('Location', '')
      job_id = location.rstrip('/').split('/')[-1] if location else ''
      ```

      STEP 4: Monitor every 60 seconds. Re-acquire token every 45 minutes:
      ```python
      start = time.time()
      iteration = 0
      while True:
          iteration += 1
          if iteration % 45 == 0:
              token = get_token('https://api.fabric.microsoft.com/.default')
          status_url = f'https://api.fabric.microsoft.com/v1/workspaces/{CODE_WS}/items/{pipeline_guid}/jobs/instances/{job_id}'
          req = urllib.request.Request(status_url, headers={'Authorization': f'Bearer {token}'})
          try:
              resp = json.loads(urllib.request.urlopen(req).read())
              status = resp.get('status', 'Unknown')
          except Exception as e:
              status = f'PollError: {e}'
          elapsed = int((time.time() - start) / 60)
          print(f'[{time.strftime("%H:%M:%S UTC", time.gmtime())}] LZ Pipeline: {status} ({elapsed}min)')
          if status.lower() in ('completed', 'failed', 'cancelled'):
              break
          if elapsed > 240:  # 4 hour max
              print('MAX WAIT EXCEEDED. Pipeline still running in Fabric. Logging and moving on.')
              break
          time.sleep(60)
      ```

      STEP 5: After completion, query processing status from SQL DB:
      ```sql
      SELECT ds.Namespace,
             SUM(CASE WHEN ple.IsProcessed = 1 THEN 1 ELSE 0 END) as processed,
             SUM(CASE WHEN ple.IsProcessed = 0 THEN 1 ELSE 0 END) as pending,
             COUNT(*) as total
      FROM execution.PipelineLandingzoneEntity ple
      JOIN integration.LandingzoneEntity le ON ple.LandingzoneEntityId = le.LandingzoneEntityId
      JOIN integration.DataSource ds ON le.DataSourceId = ds.DataSourceId
      GROUP BY ds.Namespace
      ```

      Write results to `scripts/overnight_lz_results.txt` and log to bug tracker.

      SUCCESS: LZ pipeline completed (or timed out with detailed logs).

