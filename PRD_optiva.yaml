  - title: "Run load analysis on Optiva source tables"
    parallel_group: 2
    completed: true
    description: |
      OBJECTIVE: Connect to the Optiva SQL Server and analyze ALL Optiva tables for:
      1. Primary keys (for Delta merge operations)
      2. Watermark columns (for incremental loads)
      3. Approximate row counts

      SOURCE SERVER:
      - Server: SQLOptivaLive
      - Database: OptivaLive
      - Try BOTH auth methods (one will work):
        Method 1 (Windows Auth): Trusted_Connection=yes;TrustServerCertificate=yes
        Method 2 (SQL Auth): UID=UsrSQLRead;PWD=Ku7T@hoqFDmDPqG4deMgrrxQ9
      - Driver: ODBC Driver 18 for SQL Server
      - Connection Timeout: 30s, Command Timeout: 120s

      STEP 1: Read `scripts/entities_to_analyze.json` and filter to ns == 'OPTIVA'.

      STEP 2: Connect to SQLOptivaLive/OptivaLive. Try Windows Auth first, fall back to SQL Auth.
      ```python
      import pyodbc
      DRIVER = 'ODBC Driver 18 for SQL Server'
      # Try Windows Auth first
      try:
          conn = pyodbc.connect(
              f'DRIVER={{{DRIVER}}};SERVER=SQLOptivaLive;DATABASE=OptivaLive;'
              f'Trusted_Connection=yes;TrustServerCertificate=yes;'
              f'Connection Timeout=30;Command Timeout=120')
          print('Connected via Windows Auth')
      except Exception as e1:
          print(f'Windows Auth failed: {e1}')
          try:
              conn = pyodbc.connect(
                  f'DRIVER={{{DRIVER}}};SERVER=SQLOptivaLive;DATABASE=OptivaLive;'
                  f'UID=UsrSQLRead;PWD=Ku7T@hoqFDmDPqG4deMgrrxQ9;'
                  f'TrustServerCertificate=yes;Encrypt=yes;'
                  f'Connection Timeout=30;Command Timeout=120')
              print('Connected via SQL Auth')
          except Exception as e2:
              print(f'SQL Auth also failed: {e2}')
              # Log to bug tracker and exit
      ```

      STEP 3: For each OPTIVA entity, analyze:

      a) Primary Keys:
      ```sql
      SELECT c.name FROM sys.indexes i
      JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id = ic.index_id
      JOIN sys.columns c ON ic.object_id = c.object_id AND ic.column_id = c.column_id
      JOIN sys.tables t ON i.object_id = t.object_id
      JOIN sys.schemas s ON t.schema_id = s.schema_id
      WHERE i.is_primary_key = 1 AND s.name = ? AND t.name = ?
      ORDER BY ic.key_ordinal
      ```

      b) Watermark Columns (priority: rowversion > Modified datetime > Created datetime > identity > any datetime):
      ```sql
      SELECT c.name AS ColumnName, t2.name AS DataType,
             COLUMNPROPERTY(OBJECT_ID(QUOTENAME(s.name) + '.' + QUOTENAME(t.name)), c.name, 'IsIdentity') AS IsIdentity
      FROM sys.tables t
      JOIN sys.schemas s ON t.schema_id = s.schema_id
      JOIN sys.columns c ON t.object_id = c.object_id
      JOIN sys.types t2 ON c.system_type_id = t2.system_type_id AND c.user_type_id = t2.user_type_id
      WHERE s.name = ? AND t.name = ?
      AND (t2.name IN ('timestamp','rowversion')
           OR (t2.name IN ('datetime','datetime2','datetimeoffset','smalldatetime')
               AND (c.name LIKE '%[Mm]odif%' OR c.name LIKE '%[Uu]pdat%' OR c.name LIKE '%[Cc]hang%'
                    OR c.name LIKE '%[Tt]imestamp%' OR c.name LIKE '%[Cc]reat%'))
           OR COLUMNPROPERTY(OBJECT_ID(QUOTENAME(s.name)+'.'+QUOTENAME(t.name)), c.name, 'IsIdentity') = 1
           OR t2.name IN ('datetime','datetime2','datetimeoffset','smalldatetime'))
      ORDER BY CASE
          WHEN t2.name IN ('timestamp','rowversion') THEN 1
          WHEN (c.name LIKE '%[Mm]odif%' OR c.name LIKE '%[Uu]pdat%') AND t2.name IN ('datetime','datetime2','datetimeoffset','smalldatetime') THEN 2
          WHEN c.name LIKE '%[Cc]hang%' AND t2.name IN ('datetime','datetime2','datetimeoffset','smalldatetime') THEN 3
          WHEN c.name LIKE '%[Cc]reat%' AND t2.name IN ('datetime','datetime2','datetimeoffset','smalldatetime') THEN 4
          WHEN COLUMNPROPERTY(OBJECT_ID(QUOTENAME(s.name)+'.'+QUOTENAME(t.name)), c.name, 'IsIdentity') = 1 THEN 5
          ELSE 6
      END
      ```

      c) Row count:
      ```sql
      SELECT SUM(p.rows) FROM sys.tables t
      JOIN sys.schemas s ON t.schema_id = s.schema_id
      JOIN sys.partitions p ON t.object_id = p.object_id AND p.index_id IN (0,1)
      WHERE s.name = ? AND t.name = ?
      ```

      STEP 4: Update `scripts/entities_to_analyze.json` — for each OPTIVA entity, set:
      - is_incr: True if watermark column found with priority <= 5
      - incr_col: the best watermark column name (or None)
      Save detailed results separately to `scripts/load_optimization_results_optiva.json`:
      ```json
      {
        "timestamp": "ISO8601",
        "source": "OPTIVA",
        "server": "SQLOptivaLive",
        "database": "OptivaLive",
        "auth_method": "Windows|SQL",
        "total_analyzed": N,
        "incremental_found": N,
        "with_pks": N,
        "results": [
          {"id": N, "schema": "dbo", "name": "Table", "primary_keys": "Col1,Col2",
           "watermark_col": "ModifiedDate", "watermark_type": "datetime2",
           "row_count": 12345, "is_incremental": true}
        ]
      }
      ```

      STEP 5: Print summary and log any errors to `scripts/overnight_bug_tracker.md`.

      If connection fails after both auth methods, write a detailed error to the bug tracker
      including the exact error message, and mark as FAILED. DO NOT retry more than 3 times total.

      SUCCESS: entities_to_analyze.json updated with Optiva analysis, detailed results saved.

