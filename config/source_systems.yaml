# Source System Configuration
# Used by deploy_from_scratch.py for Phase 4 (Connections) and Phase 11 (SQL Metadata)
# Edit this file to add/remove on-prem source systems — zero Python changes needed.

gateway_connections:
  CON_FMD_M3DB1_MES:
    metadata_type: SQL
    description: "MES database on m3-db1 via on-prem gateway"
    cred_type: Basic
  CON_FMD_M3DB3_ETQSTAGINGPRD:
    metadata_type: SQL
    description: "ETQStagingPRD on sql2016live via on-prem gateway"
    cred_type: Basic
  CON_FMD_M3DB1_M3:
    metadata_type: SQL
    description: "M3 ERP (m3fdbprd) on m3-db1 via on-prem gateway"
    cred_type: Basic
  CON_FMD_M3DB1_M3CLOUD:
    metadata_type: SQL
    description: "M3 Cloud (DI_PRD_Staging) on sql2016live via on-prem gateway"
    cred_type: Basic
  CON_FMD_M3DB2_XRITE10:
    metadata_type: SQL
    description: "XRite10 on M3-Db2 via on-prem gateway"
    cred_type: Basic
  CON_FMD_M3DB3_SYSAID:
    metadata_type: SQL
    description: "SysAid (sysaid) on M3-DB3 via on-prem gateway"
    cred_type: Basic
  CON_FMD_M3DB3_SCHEDULING55:
    metadata_type: SQL
    description: "Scheduling55 on M3-DB3 via on-prem gateway"
    cred_type: Basic

datasources:
  MES:
    connection: CON_FMD_M3DB1_MES
    namespace: dbo
    target_schema: mes
    type: SQL
    description: "MES production database (445 entities)"
  ETQStagingPRD:
    connection: CON_FMD_M3DB3_ETQSTAGINGPRD
    namespace: dbo
    target_schema: etq
    type: SQL
    description: "ETQ Staging PRD (29 entities)"
  DI_PRD_Staging:
    connection: CON_FMD_M3DB1_M3CLOUD
    namespace: dbo
    target_schema: m3c
    type: SQL
    description: "M3 Cloud DI_PRD_Staging (185 entities)"
  m3fdbprd:
    connection: CON_FMD_M3DB1_M3
    namespace: dbo
    target_schema: m3
    type: SQL
    description: "M3 ERP production database"
  XRite10:
    connection: CON_FMD_M3DB2_XRITE10
    namespace: dbo
    target_schema: xrite
    type: SQL
    description: "XRite10 color management database on M3-Db2"
  sysaid:
    connection: CON_FMD_M3DB3_SYSAID
    namespace: dbo
    target_schema: sysaid
    type: SQL
    description: "SysAid IT ticketing system on M3-DB3"
  Scheduling55:
    connection: CON_FMD_M3DB3_SCHEDULING55
    namespace: dbo
    target_schema: scheduling
    type: SQL
    description: "Scheduling55 on M3-DB3"
