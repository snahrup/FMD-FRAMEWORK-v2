project_name: FMD_FRAMEWORK
description: >
  Fabric Metadata-Driven Framework (FMD) - Enterprise data pipeline framework for Microsoft Fabric
  with medallion architecture (Landing Zone → Bronze → Silver → Gold), metadata-driven orchestration,
  and a modern React dashboard for real-time monitoring and control.

tech_stack:
  frontend:
    language: TypeScript
    framework: React 19
    build_tool: Vite 7.3
    styling: Tailwind CSS 4.2
    ui_libraries:
      - Radix UI (headless components)
      - Recharts 3.7 (charts/graphs)
      - Lucide React 0.574 (icons)
      - Cytoscape 3.33 (graph visualization)
      - react-router-dom 7.13 (SPA routing)
      - class-variance-authority 0.7
      - react-markdown 10.1
      - date-fns 4.1
    dev_server_port: 5173
    production_port: 8787

  backend:
    language: Python 3.8+
    framework: stdlib HTTPServer (custom BaseHTTPRequestHandler)
    port: 8787
    dependencies:
      - pyodbc (SQL connections)
      - polars (DataFrame processing)
      - azure-storage-file-datalake (OneLake upload)
      - pyyaml (config parsing)
    auth: Service Principal OAuth2 (client credentials)

  engine:
    language: Python 3.8+
    modules:
      - orchestrator.py (main run loop, adaptive throttling)
      - extractor.py (on-prem SQL → Parquet)
      - loader.py (Parquet → OneLake ADLS)
      - auth.py (SP token management)
      - connections.py (Fabric SQL + on-prem SQL)
      - logging_db.py (audit stored procedures)
      - api.py (REST endpoint handlers)
      - preflight.py (health checks)
      - notebook_trigger.py (Fabric notebook execution)
      - pipeline_runner.py (Fabric pipeline execution)

  data_pipelines:
    platform: Microsoft Fabric
    notebooks: PySpark (Synapse)
    pipelines: 22 landing zone + 2 bronze/silver (JSON-defined)

features:
  frontend_pages:
    - ExecutionMatrix (main dashboard, run history, status)
    - EngineControl (start/stop/monitor engine, SSE streaming)
    - ControlPlane (metadata & entity management)
    - ExecutionLog (detailed logs with filtering)
    - ErrorIntelligence (error categorization & suggestions)
    - SourceManager (source SQL connection management)
    - DataJourney (lineage & data flow visualization)
    - PipelineMonitor (pipeline run tracking)
    - RecordCounts (entity digest row counts)
    - LoadProgress (load progress tracking)
    - DataProfiler (data profiling)
    - AdminGateway (admin authentication)
    - AdminGovernance (governance settings)
    - ExecutiveDashboard (executive summary)
    - LiveMonitor (real-time monitoring)
    - DataBlender (SQL workbench)
    - FlowExplorer (Cytoscape graph)
    - ConfigManager (configuration management)
    - SetupSettings (setup wizard)
    - ProvisionAll (provisioning)
    - CleansingRuleEditor (DQ rules - labs)
    - ScdAudit (SCD audit - labs)
    - GoldMlvManager (Gold layer - labs)
    - DqScorecard (DQ scorecard - labs)

  backend_endpoints:
    engine:
      - GET /api/engine/status
      - POST /api/engine/start
      - POST /api/engine/stop
      - GET /api/engine/plan
      - GET /api/engine/logs
      - GET /api/engine/logs/stream (SSE)
      - POST /api/engine/retry
      - POST /api/engine/abort-run
      - GET /api/engine/health
      - GET /api/engine/metrics
      - POST /api/engine/entity/*/reset
      - GET /api/engine/runs
    sql:
      - GET /api/sql/query
      - GET /api/entity/digest
    fabric:
      - GET /api/connections
      - GET /api/pipelines
      - GET /api/notebooks
      - GET /api/workspaces
    purview:
      - GET /api/purview/search
      - GET /api/purview/lineage
    config:
      - GET /api/config
      - POST /api/config
      - GET /api/admin/config

  key_features:
    - Metadata-driven pipeline orchestration (659 entities, 26+ pipelines)
    - Adaptive throttling (AIMD-style concurrency control)
    - Incremental loading with watermark management
    - Real-time SSE log streaming
    - Entity digest engine (aggregation + caching)
    - Service Principal authentication (Fabric, SQL, OneLake)
    - 17-phase deployment automation
    - On-prem to cloud data migration (4 SQL sources)

routing:
  - path: /
    page: ExecutionMatrix
  - path: /engine
    page: EngineControl
  - path: /control
    page: ControlPlane
  - path: /logs
    page: ExecutionLog
  - path: /errors
    page: ErrorIntelligence
  - path: /admin
    page: AdminGateway
  - path: /flow
    page: FlowExplorer
  - path: /sources
    page: SourceManager
  - path: /blender
    page: DataBlender
  - path: /counts
    page: RecordCounts
  - path: /journey
    page: DataJourney
  - path: /config
    page: ConfigManager
  - path: /progress
    page: LoadProgress
  - path: /profiler
    page: DataProfiler
  - path: /monitor
    page: LiveMonitor
  - path: /executive
    page: ExecutiveDashboard
  - path: /governance
    page: AdminGovernance
  - path: /setup
    page: SetupSettings
  - path: /provision
    page: ProvisionAll
